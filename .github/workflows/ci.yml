name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Prisma needs a value at generate time; never connected to in CI.
  DATABASE_URL: 'file:./data/app.db'

jobs:
  quality:
    name: Check, test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @game-tracker/backend prisma:generate

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm -r build

  docker:
    name: Docker build & smoke test
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: docker compose build

      - name: Start the stack
        # Dummy IGDB creds let the backend boot; the token is only fetched on the
        # first real IGDB call, so /api/health needs no valid credentials.
        env:
          IGDB_CLIENT_ID: ci-dummy
          IGDB_CLIENT_SECRET: ci-dummy
        run: docker compose up -d

      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            if curl -fs http://localhost:3001/api/health > /dev/null; then
              echo "backend healthy"; exit 0
            fi
            sleep 2
          done
          echo "backend did not become healthy"; docker compose logs backend; exit 1

      - name: Check frontend proxy
        run: |
          for i in $(seq 1 30); do
            if curl -fs http://localhost:5173/api/health | grep -q '"status":"ok"'; then
              echo "frontend proxy ok"; exit 0
            fi
            sleep 2
          done
          echo "frontend proxy did not respond"; docker compose logs frontend; exit 1

      - name: Tear down
        if: always()
        run: docker compose down -v

  publish:
    name: Publish images to GHCR
    runs-on: ubuntu-latest
    needs: [quality, docker]
    # Only on a push to main, not on pull requests.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image prefix
        id: prep
        run: echo "prefix=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ steps.prep.outputs.prefix }}-backend:latest
            ${{ steps.prep.outputs.prefix }}-backend:${{ github.sha }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.prep.outputs.prefix }}-frontend:latest
            ${{ steps.prep.outputs.prefix }}-frontend:${{ github.sha }}
